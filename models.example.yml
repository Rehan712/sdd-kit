# Model policy for the SDD kit — MACHINE-LOCAL configuration.
#
# setup.sh bootstraps models.yml (gitignored) from this file — or interactively
# via scripts/configure-models.sh. Edit models.yml, not this example — by hand,
# or from the command line: scripts/model-policy.sh update <role> <model>
# (or set/unset tier|role|dispatch). CLI edits are validated before saving and
# re-stamp the generated copies + adapters automatically.
#
# WHY: not every SDD phase deserves the same model. Design and adversarial
# judgment (specify/plan/tasks, the two gates, security review) want the
# strongest reasoning models on high effort; rote implementation is fine —
# and faster and cheaper — on a mid-tier model.
#
# TIERS name a model class per CLI. Keys inside a tier (all optional — omit a
# key to leave that CLI's session default untouched for the tier):
#   claude_model:    alias (opus | sonnet | haiku | fable) or a full model ID
#                    (e.g. claude-opus-4-8). Prefer aliases — ad-hoc subagent
#                    dispatch (the Explore agent) only accepts aliases.
#   claude_effort:   low | medium | high | xhigh | max
#                    (avoid max — Claude Code treats it as session-only)
#   codex_model:     OpenAI Codex CLI `model` (e.g. gpt-5.5, gpt-5.4)
#   codex_effort:    Codex `model_reasoning_effort`
#                    (none|minimal|low|medium|high|xhigh|ultra|max — the upper
#                    values are model-dependent)
#   codex_sandbox:   Codex `sandbox_mode` for the tier's profile
#                    (read-only | workspace-write | danger-full-access)
#   codex_approval:  Codex `approval_policy` for the tier's profile
#                    (untrusted | on-failure | on-request | never).
#                    Subagents spawned in a session INHERIT the session's
#                    configured sandbox/approval — permission keys in the
#                    subagent TOMLs are not honored (codex-cli 0.144.x) — so
#                    these two keys are the lever that lets gate/escalation
#                    subagents run without per-command prompts: launch the
#                    session as `codex --profile sdd-<tier>`.
#   copilot_model:   GitHub Copilot CLI model id for the agent frontmatter
#   copilot_effort:  advisory — written into the adapter preamble text only
#
# ROLES map each SDD role to a tier:
#   skills:  specify, plan, tasks, implement, review, retro, onboard, go
#   agents:  orchestrator, opponent, reality-check, security-reviewer,
#            test-engineer, stack-expert (covers every agents/*-expert.md)
#   runtime: explore (the Explore subagents /sdd:plan and /sdd:onboard fan out);
#            implement-hard (looked up at dispatch by /sdd:implement and the
#            orchestrator for [hard]-tagged tasks, failed-acceptance retries,
#            and gate follow-ups — escalation, never stamped into a file)
#
# HOW IT'S APPLIED
#   scripts/apply-models.sh stamps model/effort into generated copies of the
#   skills + agents under build/ (Claude homes symlink to those), and
#   scripts/build-adapters.sh stamps the Codex/Copilot adapters and writes
#   the sdd-<tier> profile files into every codex home (~/.codex plus any
#   ~/.codex_* profile home). Re-run scripts/setup.sh (or those two scripts)
#   after editing this file.

tiers:
  reasoning:            # deep design + adversarial judgment — strongest models
    claude_model: opus
    claude_effort: xhigh
    codex_model: gpt-5.5
    codex_effort: xhigh
    copilot_model: claude-opus-4.8
    copilot_effort: xhigh

  implementation:       # code-writing work — mid-tier, faster and cheaper
    claude_model: sonnet
    claude_effort: high
    codex_model: gpt-5.4
    codex_effort: high
    copilot_model: claude-sonnet-4.5
    copilot_effort: high

  # recon — cheap fan-out exploration; safe to run low because every claim is
  # re-verified downstream (/sdd:plan re-reads explorer findings first-hand
  # before anything enters the design, by grounding rule).
  recon:
    claude_model: haiku
    claude_effort: medium

roles:
  specify: reasoning
  plan: reasoning
  tasks: reasoning
  retro: reasoning
  implement: implementation
  implement-hard: reasoning    # [hard] tasks, failed-acceptance retries, gate
                               # follow-ups — escalate instead of repeating a
                               # failure at the tier that produced it
  orchestrator: reasoning
  opponent: reasoning
  reality-check: reasoning
  security-reviewer: reasoning
  test-engineer: reasoning     # tests are specification artifacts — they bind
                               # AC ids, and every gate trusts that binding; a
                               # green-but-tautological suite is the one hole
                               # the gates can't fully cover, so keep it strong
  stack-expert: implementation
  explore: recon               # /sdd:plan fan-out; claims re-verified downstream
  onboard: implementation      # briefs are durable planning inputs — keep mid-tier
  review: implementation       # /sdd:review — PR babysitting + CI triage
  go: reasoning                # /sdd:go autopilot conductor (chained phases keep their own tiers)

# DISPATCH (optional) — route a PHASE to the CLI that should RUN it, across
# providers: e.g. plan on Claude Code, tasks on Codex (gpt-5.5), implement on
# Copilot (claude-sonnet-5). The phase skills detect the mapping and offer
# `scripts/spec-dispatch.sh <role> <spec-dir>`, which runs the target CLI
# headlessly in the right working root and verifies the artifacts on return
# (sdd-analyze / spec-evidence — provider-agnostic, same gates as always).
#
# Single-provider setups: OMIT this block entirely. No dispatch map = every
# phase runs in the CLI you're typing in, exactly as before. Each mapped CLI
# must be installed and authenticated on this machine (doctor checks).
#
# Dispatchable roles: plan, tasks, implement, retro. `specify` never (it's an
# interview); `review` never (merge decisions are interactive). Umbrella specs:
# plan/tasks/retro run hub-rooted; implement takes --repo <name> (one repo
# slice per run); the cross-repo orchestrated --all never dispatches.
#
# dispatch:
#   tasks: codex
#   implement: copilot
