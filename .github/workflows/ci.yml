# CI for the kit's own deterministic layer: the gate scripts must stay
# correct (tests/) and portable (shellcheck; Linux + macOS incl. bash 3.2 —
# the floor the scripts document in scripts/lib.sh).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck (warning severity blocks)
        run: shellcheck -S warning -x scripts/*.sh tests/*.sh

  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: run the test suite
        run: tests/run.sh

  tests-bash32:
    # macOS ships /bin/bash 3.2. Shimming `bash` on PATH to it makes every
    # `#!/usr/bin/env bash` script under test actually run on 3.2, enforcing
    # the kit's compatibility claim instead of assuming it.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: run the test suite under bash 3.2
        run: |
          mkdir -p "$RUNNER_TEMP/b32shim"
          ln -sf /bin/bash "$RUNNER_TEMP/b32shim/bash"
          PATH="$RUNNER_TEMP/b32shim:$PATH" /bin/bash tests/run.sh
